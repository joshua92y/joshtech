name: Build & Deploy FastAPI to GHCR & Fly.io

on:
  push:
    paths:
      - 'apps/backend_api/**'
      - 'packages/shared_schemas/**'
      - '.github/workflows/deploy-fastapi-ghcr.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 소스코드 체크아웃
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. GHCR 로그인
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      # 3. Fly.io 레지스트리 로그인
      - name: Log in to Fly.io Docker Registry
        run: echo "${{ secrets.FLY_API_TOKEN }}" | docker login registry.fly.io -u x --password-stdin

      # 4. Docker 이미지 빌드
      - name: Build Docker image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/joshtech-fastapi:latest -f apps/backend_api/Dockerfile .

      # 5. GHCR에 푸시
      - name: Push image to GHCR
        run: docker push ghcr.io/${{ github.repository_owner }}/joshtech-fastapi:latest

      # 6. Fly.io에 맞게 이미지 태깅
      - name: Tag image for Fly.io
        run: |
          docker tag ghcr.io/${{ github.repository_owner }}/joshtech-fastapi:latest registry.fly.io/joshtech-api:latest

      # 7. Fly.io 레지스트리에 푸시
      - name: Push image to Fly.io
        run: docker push registry.fly.io/joshtech-api:latest

      # 8. Fly.io에 배포
      - name: Deploy to Fly.io
        run: flyctl deploy --image registry.fly.io/joshtech-api:latest
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
